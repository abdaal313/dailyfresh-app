<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyFresh | The Shop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; padding: 20px; }
        .product-card { border: 1px solid #e2e8f0; padding: 20px; border-radius: 16px; text-align: center; background: white; }
        .product-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; }
        .qty-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: #e2e8f0; cursor: pointer; }
        .qty-display { font-weight: bold; min-width: 20px; }
        #cart-items { list-style: none; padding: 0; margin: 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .checkout-area { display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
        .cart-item-controls { display: flex; align-items: center; gap: 8px; }
.cart-qty-btn { width: 24px; height: 24px; border-radius: 50%; border: none; background: #e2e8f0; cursor: pointer; font-weight: bold; }
.cart-remove-btn { background: #fee2e2; color: #dc2626; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 13px; margin-left: 10px; }
.cart-item-name { flex: 1; }
    </style>
</head>
<body>

    <nav class="raised-panel">
        <div class="logo">Dairy<span>Fresh</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="shop.html" style="color: var(--accent);">Shop</a>
        </div>
        <button class="cart-btn raised-button" onclick="document.getElementById('cart-section').scrollIntoView({behavior:'smooth'});">
            Cart (<span id="cart-count">0</span>)
        </button>
    </nav>

    <section id="shop" style="padding-top: 2rem;">
        <h2 class="section-title">Complete Inventory</h2>
        <div id="menu-container" class="product-grid">
            <p>Loading products...</p>
        </div>
    </section>

    <section id="cart-section" style="padding: 2rem;">
        <h2 class="section-title">Your Order Tray</h2>
        <ul id="cart-items"></ul>
        <div class="checkout-area inset-panel" style="margin-top: 1.5rem; padding: 1.5rem;">
            <h3>Total: ₹<span id="cart-total">0.00</span></h3>
            <a href="checkout.html" class="checkout-btn raised-button">Proceed to Checkout</a>
        </div>
    </section>
<script>
    // 🌟 Dynamic Base URL Detection
    const API_BASE = window.location.port === '5500' ? 'http://localhost:3000' : '';
    
    // Global state for item quantities
    const quantities = {};

    // 1. Fetch and Display Menu Items
    async function loadMenu() {
        try {
            const res = await fetch(`${API_BASE}/api/menu`); 
            
            if (!res.ok) {
                throw new Error(`Server responded with status: ${res.status}`);
            }

            const menu = await res.json();
            const container = document.getElementById('menu-container');
            
            if (!container) return;
            container.innerHTML = ''; 
            
            if (!menu || menu.length === 0) {
                container.innerHTML = '<p class="no-items">No items found in inventory.</p>';
                return;
            }

            menu.forEach(item => {
                if (!quantities[item.name]) {
                    quantities[item.name] = 1;
                }
                
                const card = document.createElement('div');
                card.className = 'product-card';
                
                const imageUrl = item.image && item.image !== 'default.jpg' 
                    ? `/uploads/${item.image}` 
                    : 'placeholder.jpg';

                card.innerHTML = `
                    <img src="${imageUrl}" alt="${item.name}" crossorigin="anonymous" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22150%22%3E%3Crect fill=%22%23f5f5f5%22 width=%22150%22 height=%22150%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2214%22%3ENo Image%3C/text%3E%3C/svg%3E';">
                    <h3>${item.name}</h3>
                    <p class="price">Price: ₹${parseFloat(item.price).toFixed(2)}</p>
                    
                    <div class="qty-control">
                        <button class="qty-btn" onclick="updateQty('${item.name}', -1)">-</button>
                        <span class="qty-display" id="qty-${item.name}">${quantities[item.name] || 0}</span>
                        <button class="qty-btn" onclick="updateQty('${item.name}', 1)">+</button>
                    </div>
                    
                    <button class="raised-button" onclick="handleAddToCart('${item.name}', ${item.price})">Add to Tray</button>
                `;
                container.appendChild(card);
            });
        } catch (err) {
            console.error("Error fetching menu:", err);
            const container = document.getElementById('menu-container');
            if (container) {
                container.innerHTML = '<p class="error-message">Failed to load products. Please try again later.</p>';
            }
        }
    }

    // 2. Handle Quantity Counter Changes (on product cards)
    function updateQty(itemName, change) {
        if (!quantities[itemName]) quantities[itemName] = 1;
        
        quantities[itemName] += change;
        
        if (quantities[itemName] < 1) {
            quantities[itemName] = 1;
        }
        
        const qtyDisplay = document.getElementById(`qty-${itemName}`);
        if (qtyDisplay) {
            qtyDisplay.textContent = quantities[itemName];
        }
    }

    // 3. Add Items to Local Storage Cart
    function handleAddToCart(name, price) {
        const qty = quantities[name] || 1;
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        const existingItem = cart.find(item => item.name === name);
        if (existingItem) {
            existingItem.quantity += qty;
        } else {
            cart.push({ name, price: parseFloat(price), quantity: qty });
        }
        
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
        alert(`${qty}x ${name} added to your tray!`);
        
        quantities[name] = 1;
        const qtyDisplay = document.getElementById(`qty-${name}`);
        if (qtyDisplay) qtyDisplay.textContent = 1;
    }

    // 4. Render Cart Count / Tray / Total
    function renderCart() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        const cartCount = document.getElementById('cart-count');
        if (cartCount) {
            const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalQty;
        }
        
        const cartItemsEl = document.getElementById('cart-items');
        if (cartItemsEl) {
            cartItemsEl.innerHTML = '';
            
            if (cart.length === 0) {
                cartItemsEl.innerHTML = '<li class="cart-item">Your tray is empty.</li>';
            }
            
            cart.forEach(item => {
                const li = document.createElement('li');
                li.className = 'cart-item';
                li.innerHTML = `
                    <span class="cart-item-name">${item.name}</span>
                    <div class="cart-item-controls">
                        <button class="cart-qty-btn" onclick="updateCartQty('${item.name}', -1)">-</button>
                        <span>${item.quantity}</span>
                        <button class="cart-qty-btn" onclick="updateCartQty('${item.name}', 1)">+</button>
                        <span>₹${(item.price * item.quantity).toFixed(2)}</span>
                        <button class="cart-remove-btn" onclick="removeFromCart('${item.name}')">Remove</button>
                    </div>
                `;
                cartItemsEl.appendChild(li);
            });
        }
        
        const cartTotalEl = document.getElementById('cart-total');
        if (cartTotalEl) {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotalEl.textContent = total.toFixed(2);
        }
    }

    // 5. Adjust quantity of an item already in the cart
    function updateCartQty(name, change) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const item = cart.find(i => i.name === name);
        if (!item) return;
        
        item.quantity += change;
        
        if (item.quantity <= 0) {
            cart = cart.filter(i => i.name !== name);
        }
        
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
    }

    // 6. Remove an item entirely from the cart
    function removeFromCart(name) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart = cart.filter(i => i.name !== name);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
    }

    // Initialize page logic when DOM is loaded
    document.addEventListener('DOMContentLoaded', () => {
        loadMenu();
        renderCart();
    });
</script>
</body>
</html>

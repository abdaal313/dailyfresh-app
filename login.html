<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyFresh Admin Login</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { background: white; padding: 50px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        input { width: 100%; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .error-message { background: #fed7d7; color: #c53030; padding: 12px; border-radius: 6px; margin-bottom: 20px; display: none; }
        .show { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo"><h1>🥤 DailyFresh</h1><p>Admin Dashboard</p></div>
        <div class="error-message" id="errorMsg"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Login</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            console.log("Attempting login...");

            try {
                // Using full URL to be safe during development
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();
                console.log("Server response:", data);

                if (response.ok && data.token) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.textContent = '❌ ' + (data.message || 'Login failed');
                    errorMsg.classList.add('show');
                }
            } catch (err) {
                console.error("Fetch error:", err);
                errorMsg.textContent = '❌ Network error. Is the server running?';
                errorMsg.classList.add('show');
            }
        });
    </script>
</body>
</html>
